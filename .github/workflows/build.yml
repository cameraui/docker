name: Build & Push Image

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push images to GHCR
        type: boolean
        default: false
      launcher_version:
        description: camera.ui launcher version
        type: string
        default: latest
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write # provenance attestation
  attestations: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/cameraui/camera.ui

jobs:
  build:
    name: ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: cpu
            base: ubuntu:24.04
            platforms: linux/amd64,linux/arm64
          - flavor: intel
            base: ubuntu:24.04
            platforms: linux/amd64
          - flavor: nvidia
            base: nvidia/cuda:12.6.2-cudnn-runtime-ubuntu24.04
            platforms: linux/amd64
          - flavor: amd
            base: ubuntu:24.04
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4

      # QEMU only needed for the cpu flavor's linux/arm64 emulation.
      - uses: docker/setup-qemu-action@v3
        if: contains(matrix.platforms, 'arm64')

      - uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.push }}" = "true" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      # A vX.Y.Z tag pins the launcher to X.Y.Z (reproducible image, natural
      # layer cache invalidation). A trailing -<digits> is a docker-only
      # revision: vX.Y.Z-2 still installs launcher X.Y.Z but tags the image
      # X.Y.Z-2 (npm prereleases like X.Y.Z-beta.1 are left untouched).
      # Manual runs use the input, default latest.
      - name: Resolve launcher version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            RAW="${GITHUB_REF_NAME#v}"
            VERSION="$RAW"
            if [[ "$RAW" =~ ^(.+)-[0-9]+$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "imagetag=$RAW" >> "$GITHUB_OUTPUT"
          else
            V="${{ inputs.launcher_version || 'latest' }}"
            echo "version=$V" >> "$GITHUB_OUTPUT"
            echo "imagetag=$V" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute tags
        id: tags
        run: |
          V="${{ steps.version.outputs.imagetag }}"
          if [ "${{ matrix.flavor }}" = "cpu" ]; then
            tags="${IMAGE}:latest,${IMAGE}:cpu"
            [ "$V" != "latest" ] && tags="$tags,${IMAGE}:${V},${IMAGE}:cpu-${V}"
          else
            tags="${IMAGE}:${{ matrix.flavor }}"
            [ "$V" != "latest" ] && tags="$tags,${IMAGE}:${{ matrix.flavor }}-${V}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.mode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build${{ steps.mode.outputs.push == 'true' && ' & push' || '' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platforms }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            FLAVOR=${{ matrix.flavor }}
            CAMERA_UI_VERSION=${{ steps.version.outputs.version }}
            CAMERAUI_CACHE_BUST=${{ steps.version.outputs.version == 'latest' && format('{0}-{1}', github.run_id, github.run_attempt) || '' }}
          tags: ${{ steps.tags.outputs.tags }}
          push: ${{ steps.mode.outputs.push }}
          provenance: ${{ steps.mode.outputs.push }}
          sbom: ${{ steps.mode.outputs.push }}
          cache-from: type=gha,scope=${{ matrix.flavor }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavor }}

      - name: Attest build provenance
        if: steps.mode.outputs.push == 'true' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
