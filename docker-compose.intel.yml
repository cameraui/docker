# Intel Quick Sync / VA-API + OpenCL overlay.
#   docker compose -f docker-compose.yml -f docker-compose.intel.yml up -d
name: cameraui

services:
  cameraui:
    image: ghcr.io/cameraui/camera.ui:intel
    devices:
      - /dev/dri:/dev/dri
      # Intel NPU (Core Ultra) for OpenVINO NPU inference:
      # - /dev/accel:/dev/accel
    cap_add:
      - PERFMON # Optional: only needed for the intel_gpu_top GPU-monitoring tool
